    // 🔊 PLEASANT CHIME SOUND (Multi-tone chord)
	function playChime() {
	  try {
	    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
	    const osc = audioCtx.createOscillator();
	    const gain = audioCtx.createGain();

	    osc.type = 'triangle'; // Warmer than 'sine'
	    osc.frequency.setValueAtTime(880, audioCtx.currentTime); // High A note

	    gain.gain.setValueAtTime(0, audioCtx.currentTime);
	    gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.02); // Quick fade in
	    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3); // Smooth fade out

	    osc.connect(gain);
	    gain.connect(audioCtx.destination);

	    osc.start();
	    osc.stop(audioCtx.currentTime + 0.3);
	  } catch(e) {}
	}

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function refill() {
      bag = [...new Set(movies)]; // Ensure absolute uniqueness
      shuffle(bag);
    }

    function reveal() {
      movieEl.classList.remove("hidden");
    }

    function nextMovie(e) {
      if(e) e.stopPropagation();
      if (bag.length === 0) refill();
      
      const m = bag.pop();
      movieEl.textContent = m;
      movieEl.classList.add("hidden");
      countEl.textContent = m.split(/\s+/).length + " WORDS";
      
      playChime();
