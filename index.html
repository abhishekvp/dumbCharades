<!DOCTYPE html>

  <title>Dumb Charades</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    #movie {
      font-size: 5rem;
      text-align: center;
      padding: 40px;
      max-width: 95%;
      line-height: 1.2;
    }

    #controls {
      margin-top: 40px;
      display: flex;
      gap: 20px;
    }

    button {
      font-size: 1.3rem;
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    #next {
      background: #ffcc00;
      color: #000;
    }

    #fullscreen {
      background: #444;
      color: #fff;
    }

    .actor-mode #controls {
      display: none;
    }

    .actor-mode #movie {
      font-size: 7rem;
    }
  </style>
</head>

<body>

    // ✅ Remove duplicates once, safely
    const movies = [...new Set(rawMovies)];

    let bag = [];

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function refillBag() {
      bag = shuffle([...movies]);
    }

    function nextMovie() {
      if (bag.length === 0) {
        refillBag(); // reshuffle only after all movies used
      }
      const movie = bag.pop();
      document.getElementById("movie").textContent = movie;
    }

    document.getElementById("next").addEventListener("click", (e) => {
      e.stopPropagation(); // prevent actor-mode double trigger
      nextMovie();
    });

    document.getElementById("fullscreen").addEventListener("click", (e) => {
      e.stopPropagation(); // prevent body click firing
      document.body.classList.add("actor-mode");

      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      }

      nextMovie();
    });

    // Actor mode: tap anywhere = next movie
    document.body.addEventListener("click", () => {
      if (document.body.classList.contains("actor-mode")) {
        nextMovie();
      }
    });
  </script>
